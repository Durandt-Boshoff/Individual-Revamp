<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetCafé</title>

    <!--Bootstrap link-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Icon link-->
    <script src="https://kit.fontawesome.com/a8a9f2565e.js" crossorigin="anonymous"></script>

    <!--CSS link-->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!--Navigation Section-->
    <div class="container">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4"> <a href="/"
                class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"> 
                <img src="Images/NetCafe-logo.png" alt="NetCafe Logo"class="logo">
                <span class="fs-4">NetCafé</span> </a>
            <ul class="nav">
                <li class="nav-item"><a href="index.html" class="nav-link" aria-current="page">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About us</a></li>
                <li class="nav-item"><a href="menu.html" class="nav-link">Menu</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link active">Contact us</a></li>
            </ul>
        </header>
    </div>

    <!--Hero Section-->
    <div class="px-4 py-5 my-5 text-center hero"> <img class="d-block mx-auto mb-4 logo"
            src="Images/NetCafe-logo.png" alt="NetCafe Logo">
        <h1 class="display-5 fw-bold text-body-emphasis">Contact Netcafé</h1>
    </div>

    <!--Form Section-->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="mb-3">
                    <label for="formGroupExampleInput" class="form-label">Name</label>
                    <input type="text" class="form-control" id="formGroupExampleInput"
                        placeholder="Enter your name">
                </div>
                <div class="mb-3">
                    <label for="formGroupExampleInput2" class="form-label">Email</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2"
                        placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Subject</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlTextarea1" class="form-label">Your Message</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </div>
    </div>

    <!--Footer Section-->
    <div class="container">
        <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 footer">
            <p class="col-md-4 mb-0">© 2026 NetCafé | Privacy Policy</p> <a href="/"
                class="col-md-4 d-flex align-items-center justify-content-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none"
                aria-label="Bootstrap"> 
                <img class="logo" src="Images/NetCafe-logo.png" alt="NetCafe Logo">
            </a>
            <ul class="nav col-md-4 justify-content-end">
                <li class="nav-item"><a href="index.html" class="nav-link px-2">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link px-2">About Us</a></li>
                <li class="nav-item"><a href="menu.html" class="nav-link px-2">Menu</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link px-2">Contact</a></li>
            </ul>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
